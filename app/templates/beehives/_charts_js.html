<script>
  const chartData = {{ chart_data | tojson }};
  const chartApiUrl = "{{ url_for('api.chart_data', hive_id=hive.id) }}";
  const charts = {};
  const currentRange = {{ range_str | tojson }};

  // ── Accordion state persistence (survives language switch) ──
  const accordionStateKey = 'btr_accordion_' + window.location.pathname;

  function saveAccordionState() {
    const openIds = [];
    document.querySelectorAll('.accordion-collapse.show').forEach(el => openIds.push(el.id));
    localStorage.setItem(accordionStateKey, JSON.stringify(openIds));
  }

  function restoreAccordionState() {
    try {
      const saved = JSON.parse(localStorage.getItem(accordionStateKey) || '[]');
      saved.forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.classList.contains('show')) {
          el.classList.add('show');
          const btn = document.querySelector(`[data-bs-target="#${id}"]`);
          if (btn) { btn.classList.remove('collapsed'); btn.setAttribute('aria-expanded', 'true'); }
        }
      });
    } catch(e) {}
  }

  // ── Chart helpers ──
  function getTimeOptions(range) {
    if (range === '7d' || range === '30d') {
      return { unit: 'day', displayFormats: { day: 'dd MMM' }, tooltipFormat: 'dd MMM yyyy' };
    }
    return { unit: 'hour', displayFormats: { hour: 'HH:mm' }, tooltipFormat: 'dd MMM HH:mm' };
  }

  function boundaryTickHook(scale) {
    const allTimes = [];
    scale.chart.data.datasets.forEach(ds => {
      (ds.data || []).forEach(pt => {
        const t = new Date(pt.x).valueOf();
        if (!isNaN(t)) allTimes.push(t);
      });
    });
    if (!allTimes.length || !scale.ticks.length) return;
    const minVal = allTimes.reduce((m, v) => v < m ? v : m, Infinity);
    const maxVal = allTimes.reduce((m, v) => v > m ? v : m, -Infinity);
    if (scale.ticks[0].value > minVal) scale.ticks.unshift({ value: minVal });
    if (scale.ticks[scale.ticks.length - 1].value < maxVal) scale.ticks.push({ value: maxVal });
  }

  function convertToPoints(dataset) {
    if (!dataset || !dataset.labels) return [];
    return dataset.labels.map((t, i) => ({ x: t, y: dataset.data[i] }));
  }

  function makeMultiSeriesChart(id, title, seriesConfigs, yOptions = {}, range = '24h') {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    const datasets = seriesConfigs.map((sc, idx) => {
      const pts = convertToPoints(chartData[sc.sensorKey] || { labels: [], data: [] });
      const color = sc.color || ['#dc3545','#e46060','#0d6efd','#4b8dff','#6a1b9a'][idx % 5];
      return {
        label: sc.label || sc.sensorKey,
        data: pts,
        borderColor: color,
        backgroundColor: color + '22',
        fill: true,
        tension: 0.3,
        pointRadius: pts.length > 200 ? 0 : 2,
        borderWidth: 2,
        hidden: sc.visible === false,
        sensorKey: sc.sensorKey,
      };
    });

    const chart = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        plugins: { legend: { display: true } },
        scales: {
          x: {
            type: 'time',
            time: getTimeOptions(range),
            ticks: { maxTicksLimit: 8 },
            afterBuildTicks: boundaryTickHook,
          },
          y: { beginAtZero: false, ...yOptions }
        }
      }
    });
    charts[id] = chart;
  }

  function updateMultiChart(chartId, dataObj) {
    const chart = charts[chartId];
    if (!chart) return;
    chart.data.datasets.forEach(ds => {
      ds.data = convertToPoints(dataObj[ds.sensorKey] || { labels: [], data: [] });
    });
    chart.update();
  }

  async function loadChartRange(chartId, sensorKeys, range) {
    try {
      const response = await fetch(`${chartApiUrl}?range=${encodeURIComponent(range)}`);
      if (!response.ok) { console.error('Unable to load chart data:', response.statusText); return; }
      const data = await response.json();
      const chart = charts[chartId];
      if (chart) chart.options.scales.x.time = getTimeOptions(range);
      updateMultiChart(chartId, data);
    } catch (error) { console.error('Chart loading error:', error); }
  }

  function setRangeButtonState(chartId, activeRange) {
    document.querySelectorAll(`.range-selector[data-chart-id="${chartId}"]`).forEach(button => {
      button.classList.toggle('btn-warning', button.dataset.range === activeRange);
      button.classList.toggle('btn-outline-secondary', button.dataset.range !== activeRange);
    });
  }

  function initializeRangeSelectors() {
    document.querySelectorAll('.range-selector').forEach(button => {
      button.addEventListener('click', async () => {
        const range = button.dataset.range;
        document.querySelectorAll('.range-selector').forEach(b => {
          b.classList.toggle('btn-warning', b.dataset.range === range);
          b.classList.toggle('btn-outline-secondary', b.dataset.range !== range);
        });
        try {
          const response = await fetch(`${chartApiUrl}?range=${encodeURIComponent(range)}`);
          if (!response.ok) { console.error('Unable to load chart data:', response.statusText); return; }
          const data = await response.json();
          Object.keys(charts).forEach(chartId => {
            const chart = charts[chartId];
            if (chart) chart.options.scales.x.time = getTimeOptions(range);
            updateMultiChart(chartId, data);
          });
        } catch (error) { console.error('Chart loading error:', error); }
      });
    });
  }

  function initializeSeriesToggles() {
    document.querySelectorAll('.series-toggle').forEach(cb => {
      cb.addEventListener('change', () => {
        const chartId = cb.dataset.chartId;
        const chart = charts[chartId];
        if (!chart) return;
        const dsIndex = chart.data.datasets.findIndex(d => d.sensorKey === cb.dataset.sensorKey);
        if (dsIndex === -1) return;
        chart.data.datasets[dsIndex].hidden = !cb.checked;
        chart.update();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Restore before chart init so opened sections have correct canvas dimensions
    restoreAccordionState();

    const defaultColorSets = {
      temperatureChart: ['#dc3545','#e46060'],
      humidityChart: ['#0d6efd','#4b8dff'],
      soundFreqChart: ['#6a1b9a','#ab47bc'],
      soundAmpChart: ['#00897b','#26a69a'],
      lightExtChart: ['#f9a825']
    };

    const chartScales = {
      humidityChart: { min: 0, max: 100 },
      lightExtChart: { min: 0, max: 100 },
    };

    document.querySelectorAll('canvas').forEach(canvas => {
      const id = canvas.id;
      const seriesInputs = Array.from(document.querySelectorAll(`.series-toggle[data-chart-id="${id}"]`));
      if (!seriesInputs.length) return;
      const seriesConfigs = seriesInputs.map((cb, idx) => ({
        sensorKey: cb.dataset.sensorKey,
        label: document.querySelector(`label[for="${cb.id}"]`).innerText,
        visible: cb.checked,
        color: (defaultColorSets[id] || ['#0d6efd'])[idx % 5]
      }));
      makeMultiSeriesChart(id, '', seriesConfigs, chartScales[id] || {}, currentRange);
    });

    initializeRangeSelectors();
    initializeSeriesToggles();

    document.querySelectorAll('.accordion-collapse').forEach(c => {
      c.addEventListener('shown.bs.collapse', (e) => {
        saveAccordionState();
        e.target.querySelectorAll('canvas').forEach(canvas => {
          const ch = charts[canvas.id];
          if (ch) { ch.resize(); ch.update(); }
        });
      });
      c.addEventListener('hidden.bs.collapse', saveAccordionState);
    });
  });
</script>
