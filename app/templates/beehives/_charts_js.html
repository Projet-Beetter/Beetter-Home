<script>
  const chartData = {{ chart_data | tojson }};
  const chartApiUrl = "{{ url_for('api.chart_data', hive_id=hive.id) }}";
  const charts = {};
  const currentRange = {{ range_str | tojson }};
  const SENSOR_THRESHOLDS = {{ thresholds | tojson }};

  function zoneColor(value, okMin, okMax, warnMin, warnMax) {
    if (value >= okMin && value <= okMax)     return '#639922';
    if (value >= warnMin && value <= warnMax) return '#BA7517';
    return '#E24B4A';
  }

  function zonePointColor(value, okMin, okMax, warnMin, warnMax) {
    if (value >= okMin && value <= okMax)     return 'rgba(99,153,34,.7)';
    if (value >= warnMin && value <= warnMax) return 'rgba(186,117,23,.7)';
    return 'rgba(226,75,74,.8)';
  }

  // ── Accordion state persistence (survives language switch) ──
  const accordionStateKey = 'btr_accordion_' + window.location.pathname;

  function saveAccordionState() {
    const openIds = [];
    document.querySelectorAll('.accordion-collapse.show').forEach(el => openIds.push(el.id));
    localStorage.setItem(accordionStateKey, JSON.stringify(openIds));
  }

  function restoreAccordionState() {
    try {
      const saved = JSON.parse(localStorage.getItem(accordionStateKey) || '[]');
      saved.forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.classList.contains('show')) {
          el.classList.add('show');
          const btn = document.querySelector(`[data-bs-target="#${id}"]`);
          if (btn) { btn.classList.remove('collapsed'); btn.setAttribute('aria-expanded', 'true'); }
        }
      });
    } catch(e) {}
  }

  // ── Chart helpers ──
  function getTimeOptions(range) {
    const timeOpts = (range === '7d' || range === '30d')
      ? { unit: 'day',  displayFormats: { day: 'dd MMM' },  tooltipFormat: 'dd MMM yyyy' }
      : { unit: 'hour', displayFormats: { hour: 'HH:mm' },  tooltipFormat: 'dd MMM HH:mm' };

    return {
      ...timeOpts,
      ticks: {
        maxTicksLimit: 8,
        callback: function(value) {
          const label = this.getLabelForValue(value);
          if (typeof label === 'string' && label.length > 0) {
            return label.charAt(0).toUpperCase() + label.slice(1);
          }
          return label;
        }
      }
    };
  }

  function boundaryTickHook(scale) {
    const allTimes = [];
    scale.chart.data.datasets.forEach(ds => {
      (ds.data || []).forEach(pt => {
        const t = new Date(pt.x).valueOf();
        if (!isNaN(t)) allTimes.push(t);
      });
    });
    if (!allTimes.length || !scale.ticks.length) return;
    const minVal = allTimes.reduce((m, v) => v < m ? v : m, Infinity);
    const maxVal = allTimes.reduce((m, v) => v > m ? v : m, -Infinity);
    if (scale.ticks[0].value > minVal) scale.ticks.unshift({ value: minVal });
    if (scale.ticks[scale.ticks.length - 1].value < maxVal) scale.ticks.push({ value: maxVal });
  }

  function getXAxisBounds(range) {
    const now = Date.now();
    const rangeMs = {
      '1h':  1 * 60 * 60 * 1000,
      '6h':  6 * 60 * 60 * 1000,
      '24h': 24 * 60 * 60 * 1000,
      '7d':  7  * 24 * 60 * 60 * 1000,
      '30d': 30 * 24 * 60 * 60 * 1000,
    };
    return { min: now - (rangeMs[range] || rangeMs['24h']), max: now };
  }

  // Maximum gap between two consecutive points before the line is broken.
  // Set to 2× the aggregation window for each range.
  const GAP_THRESHOLDS_MS = {
    '1h':  2  * 60 * 1000,        // 2 min  (window = 1 min)
    '6h':  4  * 60 * 1000,        // 4 min  (window = 2 min)
    '24h': 30 * 60 * 1000,        // 30 min (window = 15 min)
    '7d':  4  * 60 * 60 * 1000,   // 4h     (window = 2h)
    '30d': 24 * 60 * 60 * 1000,   // 24h    (window = 12h)
  };

  function convertToPoints(dataset, range) {
    if (!dataset || !dataset.labels) return [];
    const pts = dataset.labels.map((t, i) => ({ x: t, y: dataset.data[i] }));
    if (pts.length < 2) return pts;

    const gapMs = GAP_THRESHOLDS_MS[range] || GAP_THRESHOLDS_MS['24h'];
    const result = [];

    for (let i = 0; i < pts.length; i++) {
      result.push(pts[i]);
      if (i < pts.length - 1) {
        const t1 = new Date(pts[i].x).valueOf();
        const t2 = new Date(pts[i + 1].x).valueOf();
        if (t2 - t1 > gapMs) {
          // Insert a null point in the middle of the gap to break the line
          result.push({ x: new Date((t1 + t2) / 2).toISOString(), y: null });
        }
      }
    }
    return result;
  }

  function buildAnnotations(seriesConfigs) {
    const annotations = {};
    const threshSensors = seriesConfigs.filter(sc => SENSOR_THRESHOLDS[sc.sensorKey]);
    const multi = threshSensors.length > 1;
    threshSensors.forEach(sc => {
      const [ok_min, ok_max] = SENSOR_THRESHOLDS[sc.sensorKey];
      const isInt = sc.sensorKey.includes('_int');
      const pos   = (multi && !isInt) ? 'end' : 'start';
      const sfx   = multi ? (isInt ? ' int' : ' ext') : '';
      const line = y => ({
        type: 'line',
        yMin: y, yMax: y,
        borderColor: 'rgba(99,153,34,.5)',
        borderWidth: 1.5,
        borderDash: [5, 4],
        label: {
          display: true,
          content: String(y) + sfx,
          color: 'rgba(99,153,34,.85)',
          backgroundColor: 'transparent',
          font: { size: 10 },
          padding: { x: 3, y: 1 },
          position: pos,
        }
      });
      annotations[sc.sensorKey + '_ok_min'] = line(ok_min);
      annotations[sc.sensorKey + '_ok_max'] = line(ok_max);
    });
    return annotations;
  }

  function getActiveAnnotations(chart) {
    const visibleKeys = chart.data.datasets
      .filter(ds => !ds.hidden)
      .map(ds => ds.sensorKey);
    const filtered = {};
    Object.entries(chart._threshAnnotations || {}).forEach(([key, val]) => {
      const sensorKey = key.replace('_ok_min', '').replace('_ok_max', '');
      if (visibleKeys.includes(sensorKey)) filtered[key] = val;
    });
    return filtered;
  }

  function applyThresholdView(chart) {
    chart.data.datasets.forEach(ds => {
      const key = ds.sensorKey;
      const thresh = SENSOR_THRESHOLDS[key];
      if (!thresh) return;
      const [okMin, okMax, warnMin, warnMax] = thresh;
      ds.segment = {
        borderColor: ctx => {
          const mid = (ctx.p0.parsed.y + ctx.p1.parsed.y) / 2;
          return zoneColor(mid, okMin, okMax, warnMin, warnMax);
        }
      };
      ds.pointBackgroundColor = ds.data.map(pt =>
        zonePointColor(pt.y ?? pt, okMin, okMax, warnMin, warnMax)
      );
      ds.pointBorderColor = 'transparent';
      ds.pointRadius = ds.data.map(pt => {
        const v = pt.y ?? pt;
        return (v < okMin || v > okMax) ? 4 : 2;
      });
      ds.backgroundColor = 'transparent';
    });
    chart.options.plugins.annotation.annotations = getActiveAnnotations(chart);
    chart.update();
  }

  function resetNormalView(chart) {
    chart.data.datasets.forEach((ds, idx) => {
      delete ds.segment;
      const orig = chart._originalColors[idx];
      if (orig) {
        ds.borderColor = orig.borderColor;
        ds.backgroundColor = orig.backgroundColor;
        ds.pointRadius = orig.pointRadius ?? (ds.data.length > 200 ? 0 : 2);
      } else {
        ds.pointRadius = ds.data.length > 200 ? 0 : 2;
      }
      delete ds.pointBackgroundColor;
      delete ds.pointBorderColor;
    });
    chart.options.plugins.annotation.annotations = {};
    chart.update('none');
    chart.update();
  }

  function makeMultiSeriesChart(id, title, seriesConfigs, yOptions = {}, range = '24h', decimals = null) {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    const datasets = seriesConfigs.map((sc, idx) => {
      const pts = convertToPoints(
        chartData[sc.sensorKey] || { labels: [], data: [] },
        range
      );
      const color = sc.color || ['#dc3545','#e46060','#0d6efd','#4b8dff','#6a1b9a'][idx % 5];
      return {
        label: sc.label || sc.sensorKey,
        data: pts,
        borderColor: color,
        backgroundColor: color + '22',
        fill: true,
        tension: 0.3,
        pointRadius: pts.length > 200 ? 0 : 2,
        borderWidth: 2,
        hidden: sc.visible === false,
        sensorKey: sc.sensorKey,
        spanGaps: false,
      };
    });

    const chart = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        plugins: {
          tooltip: decimals !== null ? {
            callbacks: {
              label: item => `${item.dataset.label}: ${Number(item.parsed.y).toFixed(decimals)}`
            }
          } : {},
          legend: {
            display: true,
            onClick(e, legendItem, legend) {
              const chart = legend.chart;
              const dsIndex = legendItem.datasetIndex;
              const ds = chart.data.datasets[dsIndex];
              // Prevent hiding the last visible series
              if (!ds.hidden) {
                const otherVisible = chart.data.datasets.some((d, i) => i !== dsIndex && !d.hidden);
                if (!otherVisible) return;
              }
              ds.hidden = !ds.hidden;
              const threshBtn = document.querySelector(`.threshold-toggle-btn[data-chart-id="${chart.canvas.id}"]`);
              if (threshBtn && threshBtn.checked) {
                chart.options.plugins.annotation.annotations = getActiveAnnotations(chart);
              }
              chart.update();
            }
          },
          annotation: { annotations: {} },
        },
        scales: {
          x: (() => {
            const { ticks: xTicks, ...timeOpts } = getTimeOptions(range);
            const bounds = getXAxisBounds(range);
            return { type: 'time', time: timeOpts, ticks: xTicks, min: bounds.min, max: bounds.max, afterBuildTicks: boundaryTickHook };
          })(),
          y: { beginAtZero: false, ...yOptions, grace: '5%',
               ...(decimals !== null ? { ticks: { callback: v => Number(v).toFixed(decimals) } } : {}) }
        }
      }
    });
    chart._threshAnnotations = buildAnnotations(seriesConfigs);
    chart._originalColors = datasets.map(ds => ({
      borderColor: ds.borderColor,
      backgroundColor: ds.backgroundColor,
      pointRadius: ds.pointRadius,
    }));
    charts[id] = chart;
  }

  function updateMultiChart(chartId, dataObj, range) {
    const chart = charts[chartId];
    if (!chart) return;
    const activeRange = range || currentRange;
    chart.data.datasets.forEach(ds => {
      ds.data = convertToPoints(
        dataObj[ds.sensorKey] || { labels: [], data: [] },
        activeRange
      );
    });
    chart.update();
  }

  async function loadChartRange(chartId, sensorKeys, range) {
    try {
      const response = await fetch(`${chartApiUrl}?range=${encodeURIComponent(range)}`);
      if (!response.ok) { console.error('Unable to load chart data:', response.statusText); return; }
      const data = await response.json();
      const chart = charts[chartId];
      if (chart) { const { ticks: xTicks, ...timeOpts } = getTimeOptions(range); const bounds = getXAxisBounds(range); chart.options.scales.x.time = timeOpts; chart.options.scales.x.ticks = xTicks; chart.options.scales.x.min = bounds.min; chart.options.scales.x.max = bounds.max; }
      updateMultiChart(chartId, data, range);
    } catch (error) { console.error('Chart loading error:', error); }
  }

  function setRangeButtonState(chartId, activeRange) {
    document.querySelectorAll(`.range-selector[data-chart-id="${chartId}"]`).forEach(button => {
      button.classList.toggle('btn-warning', button.dataset.range === activeRange);
      button.classList.toggle('btn-outline-secondary', button.dataset.range !== activeRange);
    });
  }

  function initializeRangeSelectors() {
    document.querySelectorAll('.range-selector').forEach(button => {
      button.addEventListener('click', async () => {
        const range = button.dataset.range;
        document.querySelectorAll('.range-selector').forEach(b => {
          b.classList.toggle('btn-warning', b.dataset.range === range);
          b.classList.toggle('btn-outline-secondary', b.dataset.range !== range);
        });
        try {
          const response = await fetch(`${chartApiUrl}?range=${encodeURIComponent(range)}`);
          if (!response.ok) { console.error('Unable to load chart data:', response.statusText); return; }
          const data = await response.json();
          Object.keys(charts).forEach(chartId => {
            const chart = charts[chartId];
            if (chart) { const { ticks: xTicks, ...timeOpts } = getTimeOptions(range); const bounds = getXAxisBounds(range); chart.options.scales.x.time = timeOpts; chart.options.scales.x.ticks = xTicks; chart.options.scales.x.min = bounds.min; chart.options.scales.x.max = bounds.max; }
            updateMultiChart(chartId, data, range);
            const cb = document.querySelector(`.threshold-toggle-btn[data-chart-id="${chartId}"]`);
            if (cb && cb.checked) applyThresholdView(chart);
          });
        } catch (error) { console.error('Chart loading error:', error); }
      });
    });
  }

  function initializeThresholdToggles() {
    document.querySelectorAll('.threshold-toggle-btn').forEach(cb => {
      cb.addEventListener('change', () => {
        const chart = charts[cb.dataset.chartId];
        if (!chart) return;
        if (cb.checked) {
          applyThresholdView(chart);
        } else {
          resetNormalView(chart);
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Restore before chart init so opened sections have correct canvas dimensions
    restoreAccordionState();

    Chart.defaults.plugins.tooltip.callbacks.title = function(items) {
      if (!items.length) return '';
      const raw = items[0].label || '';
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    };

    const defaultColorSets = {
      temperatureChart: ['#E24B4A', '#F4A261'],
      humidityChart:    ['#2196F3', '#4CAF50'],
      soundFreqChart:   ['#9C27B0', '#00BCD4'],
      soundAmpChart:    ['#FF5722', '#009688'],
      lightExtChart:    ['#F9A825'],
    };

    const chartScales = {
      humidityChart: { min: 0, max: 100 },
      lightExtChart: { min: 0, max: 10 },
    };

    const chartDecimals = {
      temperatureChart: 1,
    };

    document.querySelectorAll('canvas').forEach(canvas => {
      const id = canvas.id;
      let series;
      try { series = JSON.parse(canvas.dataset.series || '[]'); } catch(e) { return; }
      if (!series.length) return;
      const seriesConfigs = series.map((s, idx) => ({
        sensorKey: s.key,
        label: s.label,
        visible: true,
        color: (defaultColorSets[id] || ['#0d6efd'])[idx % 5]
      }));
      makeMultiSeriesChart(id, '', seriesConfigs, chartScales[id] || {}, currentRange, chartDecimals[id] ?? null);
    });

    initializeRangeSelectors();
    initializeThresholdToggles();

    // Run once immediately so the page shows fresh sensor data without waiting 30 s
    if (typeof liveRefresh === 'function') liveRefresh();

    document.querySelectorAll('.accordion-collapse').forEach(c => {
      c.addEventListener('shown.bs.collapse', (e) => {
        saveAccordionState();
        e.target.querySelectorAll('canvas').forEach(canvas => {
          const ch = charts[canvas.id];
          if (ch) { ch.resize(); ch.update(); }
        });
      });
      c.addEventListener('hidden.bs.collapse', saveAccordionState);
    });
  });
</script>
