<!-- Range selector -->
<div class="d-flex gap-2 mb-3">
  {% for r in ['1h', '6h', '24h', '7d', '30d'] %}
    <a href="{{ url_for('beehives.detail', hive_id=hive.id, range=r) }}"
       class="btn btn-sm {{ 'btn-warning' if range_str == r else 'btn-outline-secondary' }}">{{ r }}</a>
  {% endfor %}
</div>

<!-- Charts -->
{% if chart_data %}
  <div class="row g-3">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h6 class="card-title fw-semibold mb-3"><i class="bi bi-thermometer-half text-danger me-2"></i>Temperature (°C)</h6>
          <canvas id="tempChart" height="100"></canvas>
        </div>
      </div>
    </div>
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h6 class="card-title fw-semibold mb-3"><i class="bi bi-droplet-half text-primary me-2"></i>Humidity (%)</h6>
          <canvas id="humChart" height="100"></canvas>
        </div>
      </div>
    </div>
  </div>
{% else %}
  <div class="card border-0 shadow-sm text-center py-5 text-muted">
    <i class="bi bi-graph-up fs-1"></i>
    <p class="mt-3">No data for this range.</p>
  </div>
{% endif %}
