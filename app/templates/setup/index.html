<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beetter — First-time Setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .setup-card { width: 100%; max-width: 420px; }
    .btn-amber { background: #F5CB5C; border-color: #F5CB5C; color: #1a1a1a; font-weight: 600; }
    .btn-amber:hover { background: #e8b840; border-color: #e8b840; color: #1a1a1a; }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <div class="logo mb-1">🐝 Beetter</div>
        <p class="text-muted mb-4" style="font-size:.9rem">Welcome — first-time setup</p>

        <div class="mb-3 d-flex align-items-center gap-2">
          <span class="badge rounded-pill bg-warning text-dark">Step 1 of 1</span>
          <span class="fw-semibold" style="font-size:.95rem">Create your admin account</span>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('setup.create') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   value="{{ username|default('') }}" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ email|default('') }}" autocomplete="email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="new-password" required>
          </div>
          <div class="mb-4">
            <label for="confirm" class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirm" name="confirm"
                   autocomplete="new-password" required>
          </div>

          <button type="submit" class="btn btn-amber w-100">
            Create account &amp; get started
          </button>
        </form>

      </div>
    </div>
  </div>
</body>
</html>
