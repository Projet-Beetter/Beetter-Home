services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "1"
    volumes:
      - ./templates:/templates
      - ./static:/static
    depends_on:
      db:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beetter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beetter}
      POSTGRES_DB: ${POSTGRES_DB:-beetter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beetter}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # NOTE: the official influxdb:2.x image only auto-creates ONE bucket on first
  # startup (DOCKER_INFLUXDB_INIT_BUCKET = 'sensors'). The 'predictions' bucket
  # for ML state probabilities must be created manually after the first startup:
  #   Option A — InfluxDB UI: http://localhost:8086 → Load Data → Buckets → Create Bucket
  #   Option B — CLI (inside the container):
  #     docker compose exec influxdb influx bucket create \
  #       --name predictions --org beetter --retention 0
  # Do NOT add a second DOCKER_INFLUXDB_INIT_BUCKET variable — it is not
  # supported; the init container ignores it and only creates the first bucket.
  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-beetter}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-sensors}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  influxdb_data:
